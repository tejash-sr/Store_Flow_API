name: Maven Build & Test

on:
  push:
    branches:
      - main
      - develop
      - hotfix/**
      - feature/**
      - phase-*
  pull_request:
    branches:
      - main
      - develop

env:
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.0'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: storeflow
          POSTGRES_PASSWORD: storeflow123
          POSTGRES_DB: storeflow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better commit messages
      
      - name: 🔧 Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: ✅ Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U storeflow; do
            echo 'Waiting for PostgreSQL...'
            sleep 1
          done
      
      - name: 🏗️ Build project
        run: ./mvnw clean package -DskipTests -q --no-transfer-progress
      
      - name: 🧪 Run tests
        run: ./mvnw test -q --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/storeflow_test
          SPRING_DATASOURCE_USERNAME: storeflow
          SPRING_DATASOURCE_PASSWORD: storeflow123
      
      - name: 📊 Generate test report
        if: always()
        run: |
          mkdir -p test-results
          cp -r target/surefire-reports/* test-results/ || true
      
      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
      
      - name: 📈 Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/surefire-reports/TEST-*.xml
          check_name: Test Results
          comment_on_pr: true
