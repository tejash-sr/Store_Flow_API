spring:
  application:
    name: storeflow-api
    
  profiles:
    active: dev
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # DataSource Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/storeflow
    username: storeflow
    password: storeflow123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 10000
  
  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  # Web & CORS
  web:
    cors:
      allowed-origins: "*"
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: false
      max-age: 3600

# Actuator Configuration - Observability & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    enable:
      tomcat: true
      logback: true
      process: true
      system: true
      jvm: true
    export:
      prometheus:
        enabled: true
        step: 1m
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    diskspace:
      enabled: true
  info:
    env:
      enabled: true
    app:
      enabled: true

# SpringDoc OpenAPI/Swagger Configuration
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    doc-expansion: list
    display-request-duration: true
    syntax-highlight: highlight
  api-docs:
    path: /v3/api-docs
  show-actuator: true

# Logging
logging:
  level:
    root: INFO
    com.storeflow: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springdoc: INFO
    org.hibernate: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
