spring:
  application:
    name: storeflow-api-test
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  
  # Disable Flyway for tests
  flyway:
    enabled: false

logging:
  level:
    root: WARN
    com.storeflow: INFO
