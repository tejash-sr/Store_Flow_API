spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/storeflow_test
    username: storeflow
    password: storeflow123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # Use PostgreSQL in tests
  flyway:
    enabled: false
    
logging:
  level:
    org.springframework.test: DEBUG
    org.hibernate.SQL: DEBUG

