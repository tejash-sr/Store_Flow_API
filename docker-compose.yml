version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: storeflow-db
    environment:
      POSTGRES_USER: storeflow
      POSTGRES_PASSWORD: storeflow123
      POSTGRES_DB: storeflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storeflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - storeflow-network

  postgres-test:
    image: postgres:15-alpine
    container_name: storeflow-db-test
    environment:
      POSTGRES_USER: storeflow
      POSTGRES_PASSWORD: storeflow123
      POSTGRES_DB: storeflow_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storeflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - storeflow-network

  storeflow-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storeflow-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/storeflow
      SPRING_DATASOURCE_USERNAME: storeflow
      SPRING_DATASOURCE_PASSWORD: storeflow123
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - storeflow-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: storeflow-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - storeflow-api
    networks:
      - storeflow-network
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_test_data:

networks:
  storeflow-network:
    driver: bridge
