version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: storeflow-db
    environment:
      POSTGRES_USER: storeflow
      POSTGRES_PASSWORD: storeflow123
      POSTGRES_DB: storeflow
      POSTGRES_INITDB_ARGS: "-c max_connections=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storeflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - storeflow-network

  postgres-test:
    image: postgres:15-alpine
    container_name: storeflow-db-test
    environment:
      POSTGRES_USER: storeflow
      POSTGRES_PASSWORD: storeflow123
      POSTGRES_DB: storeflow_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storeflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - storeflow-network

volumes:
  postgres_data:
  postgres_test_data:

networks:
  storeflow-network:
    driver: bridge
