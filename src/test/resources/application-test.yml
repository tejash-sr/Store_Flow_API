spring:
  datasource:
    # H2 In-Memory: For @SpringBootTest integration tests (no Docker needed)
    # AbstractRepositoryTest overrides this via @DynamicPropertySource to use PostgreSQL
    url: jdbc:h2:mem:storeflow_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000

  jpa:
    hibernate:
      # CREATE_DROP: Recreate schema from migrations for each test run
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    protocol: smtp

logging:
  level:
    root: WARN
    com.storeflow: DEBUG
    org.springframework.test: DEBUG
    org.hibernate.SQL: WARN

jwt:
  secret: test-secret-key-minimum-32-chars-long-for-testing-only-secure123
  accessTokenExpiration: 3600000
  refreshTokenExpiration: 604800000
