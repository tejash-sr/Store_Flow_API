spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  # Enable Flyway for schema versioning validation in tests
  flyway:
    enabled: true
    
logging:
  level:
    org.springframework.test: DEBUG
    org.hibernate.SQL: DEBUG



jwt:
  secret: your-super-secret-key-minimum-32-chars-long-for-test-only
