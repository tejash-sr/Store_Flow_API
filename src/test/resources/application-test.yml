spring:
  datasource:
    # Use localhost PostgreSQL for tests
    # GitHub Actions: postgres:15 service on 5432
    # Local Docker: storeflow-rest-api-test-db on 5433 (override with env var if needed)
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/storeflow_test
    driver-class-name: org.postgresql.Driver
    username: storeflow
    password: storeflow123
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000

  jpa:
    hibernate:
      # VALIDATE: Schema must match Flyway migrations
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    protocol: smtp

logging:
  level:
    root: WARN
    com.storeflow: DEBUG
    org.springframework.test: DEBUG
    org.hibernate.SQL: WARN

jwt:
  secret: test-secret-key-minimum-32-chars-long-for-testing-only-secure123
  accessTokenExpiration: 3600000
  refreshTokenExpiration: 604800000
