spring:
  datasource:
    # TESTCONTAINERS: Real PostgreSQL 15 in Docker container
    url: jdbc:tc:postgresql:15:///storeflow_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000

  jpa:
    hibernate:
      # VALIDATE: Schema must match Flyway migrations exactly
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        # Use PostgreSQL dialect to match production
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # ENABLE: Run Flyway migrations against real PostgreSQL
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    protocol: smtp

logging:
  level:
    root: WARN
    com.storeflow: DEBUG
    org.springframework.test: DEBUG
    org.hibernate.SQL: WARN

jwt:
  secret: test-secret-key-minimum-32-chars-long-for-testing-only-secure123
  accessTokenExpiration: 3600000
  refreshTokenExpiration: 604800000
