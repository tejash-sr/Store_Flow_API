spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    org.springframework.test: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: your-super-secret-key-minimum-32-chars-long-for-test-only
