spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/storeflow_test
    username: storeflow
    password: storeflow123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000

  application:
    name: storeflow-api-test
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  
  # Enable Flyway for database schema migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
  
  # Mail Configuration - Test (using Greenmail mock)
  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

logging:
  level:
    root: WARN
    com.storeflow: INFO
    org.springframework.test: WARN

# Actuator Configuration - Test environment
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# Application Configuration - Test
storeflow:
  mail:
    from: test@storeflow.local
    from-name: StoreFlow Test
  frontend:
    url: http://localhost:3000

