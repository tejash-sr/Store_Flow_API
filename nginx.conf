events {
    worker_connections 1024;
}

http {
    upstream storeflow_api {
        server storeflow-api:8080;
    }

    server {
        listen 80;
        server_name storeflowapi.duckdns.org;
        client_max_body_size 100M;

        # Redirect HTTP to HTTPS (optional - enable when you have SSL)
        # return 301 https://$server_name$request_uri;

        location / {
            proxy_pass http://storeflow_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://storeflow_api/api/health;
        }
    }
}
